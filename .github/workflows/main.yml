name: Build and Push to Docker Hub

on:
  push:
    branches: [ "main" ] # This triggers the build every time you push code

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./projectsite
          file: ./projectsite/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/projectsite:latest

